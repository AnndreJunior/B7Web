<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Listas</h1>

    <h2>Listas não ordenadas</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>
            <span>Item 3</span>
            <ul>
                <li>Item 3.1</li>
                <li>Item 3.2</li>
            </ul>
        </li>
    </ul>

    <h2>Listas ordenadas</h2>
    <ol start="80">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
</body>
</html>
