<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select</title>
  </head>
  <body>
    <form>
      <!-- <select name="ordenacao" required size="2" multiple> -- Permite selecionar mais de um item. A propriedade "size" diz a quantidade máxima -->
      <select name="ordenacao" required>
        <option value="" selected>Selecione um item</option>
        <option value="newer">Mais recentes</option>
        <option value="older">Mais antigos</option>
      </select>
      <br />
      <br />

      <button type="submit">Ordenar</button>
    </form>
  </body>
</html>
